# mute warning in pi
set -g extended-keys on
set -g extended-keys-format csi-u

# ── Prefix ──────────────────────────────────────────────────
# Keep Ctrl-b as primary prefix, add Ctrl-a as secondary
set -g prefix2 C-a
bind-key C-a send-prefix

# ── Mouse ───────────────────────────────────────────────────
# Enable mouse support (click to select panes, scroll, resize)
set -g mouse on

# ── Clipboard ───────────────────────────────────────────────
# Enable copy to system clipboard (macOS)
set -g set-clipboard on

# ── Colors & Appearance ─────────────────────────────────────
# 256 color support
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Better status bar colors
set -g status-bg black
set -g status-fg white

# Active/inactive pane borders
set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=colour51

# ── Window/Pane Indexing ───────────────────────────────────
# Start numbering at 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1

# ── Faster Esc Key (for vim users) ─────────────────────────
set -sg escape-time 0

# ── Vi Mode for Copy ───────────────────────────────────────
setw -g mode-keys vi

# ── Scrolling History ──────────────────────────────────────
set -g history-limit 50000

# ── Easier Pane Splitting ──────────────────────────────────
# | for vertical split, - for horizontal split (intuitive)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
#unbind '"'
#unbind %

# ── Smart Pane Navigation ──────────────────────────────────
# Hold prefix + arrow keys to move between panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Quick Reload ───────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# ── Window Navigation ──────────────────────────────────────
# Prefix + Tab for next window
bind Tab next-window
bind C-Tab previous-window

# ── Set Window Titles ──────────────────────────────────────
set -g set-titles on
set -g set-titles-string '#I:#W'

# ── Status Bar ─────────────────────────────────────────────
setw -g monitor-activity on
set -g visual-activity off  # don't flash, just change color

# Better window list (show current window first)
set -g renumber-windows on

# Status bar content: left=host, center=windows, right=clock
set -g status-left "[#S] "
set -g status-right "%H:%M %d-%b"
set -g status-left-length 30
set -g status-right-length 40

# ── Key for easy last-window toggle ────────────────────────
bind C-a last-window
